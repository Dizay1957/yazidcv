spring:
  application:
    name: curriva
  datasource:
    url: ${DATABASE_URL:jdbc:h2:file:./data/yazidcv;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH}
    username: ${DATABASE_USERNAME:sa}
    password: ${DATABASE_PASSWORD:}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate.jdbc.time_zone: UTC
  flyway:
    enabled: true
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 100MB
server:
  port: ${PORT:18765}
  error:
    include-message: never
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
yazidcv:
  jwt-secret: ${JWT_SECRET:change-this-development-secret-with-at-least-32-bytes}
  jwt-issuer: curriva
  upload-directory: ${UPLOAD_DIRECTORY:./data/uploads}
  cors-origin: ${CORS_ORIGIN:http://localhost:5173}
  seed-demo: ${SEED_DEMO:false}
  integrations:
    linkedin:
      access-token: ${LINKEDIN_ACCESS_TOKEN:}
      organization-urn: ${LINKEDIN_ORGANIZATION_URN:}
    indeed:
      client-id: ${INDEED_CLIENT_ID:}
      client-secret: ${INDEED_CLIENT_SECRET:}
curriva:
  bootstrap-admin-email: ${BOOTSTRAP_ADMIN_EMAIL:admin@curriva.local}
  bootstrap-admin-password: ${BOOTSTRAP_ADMIN_PASSWORD:CurrivaAdmin!2026}
logging:
  level:
    root: INFO
    dev.yazidcv: INFO
